name: DevOps Platform CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t production-devops-platform-repo ./app
          docker tag production-devops-platform-repo:latest 298493766489.dkr.ecr.ap-south-1.amazonaws.com/production-devops-platform-repo:latest

      - name: Push Docker Image to ECR
        run: |
          docker push 298493766489.dkr.ecr.ap-south-1.amazonaws.com/production-devops-platform-repo:latest