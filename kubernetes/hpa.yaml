apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-platform-hpa
  namespace: devops-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-platform-deployment

  minReplicas: 2
  maxReplicas: 5

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50